<div class="auth-container">
  <div class="auth-card">
    <h2>FitTrack</h2>
    <h3>Kayıt Ol</h3>

    @if (errorMessage) {
    <div class="error">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Ad Soyad</label>
        <input
          type="text"
          [(ngModel)]="fullName"
          name="fullName"
          placeholder="Adınız Soyadınız"
          required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="email@example.com"
          required />
      </div>

      <div class="form-group">
        <label>Şifre</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="En az 6 karakter"
          required />
      </div>

      <button type="submit">Kayıt Ol</button>
    </form>

    <p>Hesabın var mı? <a routerLink="/login">Giriş Yap</a></p>
  </div>
</div>
