<div class="auth-container">
  <div class="auth-card">
    <h2>FitTrack</h2>
    <h3>Giriş Yap</h3>

    @if (errorMessage) {
    <div class="error">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="email@example.com"
          required />
      </div>

      <div class="form-group">
        <label>Şifre</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Şifreniz"
          required />
      </div>

      <button type="submit">Giriş Yap</button>
    </form>

    <p>Hesabın yok mu? <a routerLink="/register">Kayıt Ol</a></p>
  </div>
</div>
